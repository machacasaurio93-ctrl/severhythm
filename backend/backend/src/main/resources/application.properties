spring.application.name=severhythm

# --- CONEXION BASE DE DATOS ---
spring.datasource.url=jdbc:mysql://localhost:3306/severhythm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- SUBIDA DE ARCHIVOS ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Directorio donde se almacenan los archivos subidos
app.upload.dir=uploads

# --- SEGURIDAD ---
# Desactivar el usuario por defecto de Spring Security (usamos JWT propio)
spring.security.user.password=none

# --- JWT ---
app.jwt.secret=SeveRhythmTFG2026SecretKeyMuyLargaParaQueSeaSegura1234567890ABCDEF
app.jwt.expiration=86400000
